<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 glass p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-6 text-blue-400">Customer Data</h2>
            <form id="prediction-form" class="space-y-4">
                <div>
                    <label class="text-xs uppercase tracking-wider text-slate-400">Credit Score</label>
                    <input type="number" id="credit_score" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 650">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-wider text-slate-400">Age</label>
                    <input type="number" id="age" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 mt-1 outline-none" placeholder="Years">
                </div>
                <button type="button" onclick="makePrediction()" class="w-full bg-blue-600 hover:bg-blue-500 transition-all text-white font-bold py-3 rounded-xl mt-4 neon-glow">
                    Analyze Churn
                </button>
            </form>
        </div>

        <div class="md:col-span-2 glass p-8 rounded-2xl flex flex-col justify-center items-center text-center">
            <div id="result-container" class="hidden">
                <h3 class="text-slate-400 uppercase tracking-widest text-sm mb-2">Prediction Result</h3>
                <div id="churn-badge" class="text-5xl font-extrabold mb-4">--</div>
                <p id="probability-text" class="text-blue-400 font-mono text-lg">0.00% Probability</p>
                
                <div class="w-full bg-slate-800 h-2 rounded-full mt-8 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div id="placeholder">
                <div class="opacity-20 mb-4">
                    <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <p class="text-slate-500 italic">Enter customer details and click "Analyze" to see the prediction.</p>
            </div>
        </div>
    </div>

    <script>
        async function makePrediction() {
            // Show result area, hide placeholder
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');

            const data = {
                credit_score: document.getElementById('credit_score').value,
                age: document.getElementById('age').value
                // Add all your other variables here
            };

            // Call your FastAPI bridge
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            // Update UI with results
            const prob = (result.probability * 100).toFixed(2);
            document.getElementById('probability-text').innerText = prob + "% Probability";
            document.getElementById('progress-bar').style.width = prob + "%";
            
            const badge = document.getElementById('churn-badge');
            if (result.prediction === 1) {
                badge.innerText = "CHURN RISK";
                badge.className = "text-5xl font-extrabold mb-4 text-red-500";
            } else {
                badge.innerText = "LOYAL";
                badge.className = "text-5xl font-extrabold mb-4 text-green-500";
            }
        }
    </script>
</body>
</html>
